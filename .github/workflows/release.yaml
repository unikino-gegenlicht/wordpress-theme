name: Release Theme
on: push

jobs:
  create-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: wp-cli,composer

      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Create License Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: licensing-info
          path: LICENSE

      - name: Set outputs
        id: vars
        env:
          VERSION: ${{ case( startsWith(github.ref, 'refs/heads/'), steps.vars.outputs.sha_short,  startsWith(github.ref, 'refs/tags/'), github.ref_name, 'unknown' ) }}
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create Directory Structure and Archive
        shell: bash
        env:
          VERSION:  ${{ case( startsWith(github.ref, 'refs/heads/'), steps.vars.outputs.sha_short,  startsWith(github.ref, 'refs/tags/'), steps.vars.outputs.version, 'unknown' ) }}
        run: |
          VERSION=${{ env.VERSION }}
          VERSION=${VERSION#v}
          echo "Setting Version to ${{ env.VERSION }}"
          sed -i 's/GGL_THEME_VERSION/${{ env.VERSION }}/g' assets/scss/style.scss
          composer install
          npm install
          npm run build:css
          npm run build:login-css
          npm run i18n:make-mo
          rm LICENSE
          rm README.md
          mkdir gegenlicht-theme
          shopt -s extglob
          mv !(gegenlicht-theme|.git|.github|node_modules) gegenlicht-theme/
          zip -r theme.zip gegenlicht-theme/*

      - name: Create Release Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: theme.zip
          retention-days: 1

      - name: Create Artifact
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: theme.zip
          retention-days: 7

  release-archive:

    permissions:
      contents: write

    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - create-archive
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Add Tag to Archive
        run: |
          mv theme.zip  theme.${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          draft: true
          files: |
            theme.${{ github.ref_name }}.zip
            LICENSE
